<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
    <h:head>
        <title>Formula 1</title>
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }

            body { font-family: Arial, sans-serif; background-color: white; }

            .header {
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
                background-color: white;
                position: relative;
                height: 100px;
                border-bottom: 1px solid #ddd;
            }
            .header h1 { font-size: 36px; font-weight: bold; color: black; text-align: center; }
            .header a.home-link { text-decoration: none; color: black; }
            .header a.home-link:hover { color: #29abe2; }

            .search-bar {
                position: absolute; left: 20px;
                padding: 12px 16px; font-size: 16px;
                border: 2px solid black; border-radius: 20px;
                outline: none; width: 280px;
            }

            .user-info {
                position: absolute; right: 20px;
                display: flex; align-items: center; gap: 12px;
            }
            .welcome-text { font-size: 14px; font-weight: bold; color: #333; }
            .logout-btn {
                padding: 8px 16px; background-color: #e10600;
                color: white; border: none; border-radius: 6px;
                font-size: 14px; font-weight: bold; cursor: pointer;
                text-decoration: none;
            }
            .logout-btn:hover { background-color: #b30500; }

            .nav-buttons { display: flex; width: 100%; }
            .nav-button {
                flex: 1; padding: 14px; background-color: #29abe2;
                color: white; font-size: 18px; font-weight: bold;
                text-align: center; text-decoration: none;
                border-right: 2px solid white; cursor: pointer;
            }
            .nav-button:last-child { border-right: none; }
            .nav-button:hover, .nav-button.active { background-color: #1a8abf; }

            .main-content { display: flex; padding: 20px; gap: 20px; }
            .left-side { flex: 3; display: flex; flex-direction: column; gap: 20px; }
            .intro-box {
                background-color: #f47c20; border: 2px solid #f47c20;
                border-radius: 8px; padding: 30px;
                font-size: 16px; line-height: 1.8; color: white;
            }
            .intro-box h2 { font-size: 24px; margin-bottom: 15px; color: white; }
            .glossary-box {
                background-color: #ffb6c1; border: 2px solid #f47c20;
                border-radius: 8px; padding: 20px;
            }
            .glossary-box h2 { font-size: 20px; margin-bottom: 15px; color: #333; }
            .glossary-box textarea {
                width: 100%; height: 120px; font-size: 15px; padding: 10px;
                border: 1px solid #ccc; border-radius: 6px;
                background-color: #fff0f3; resize: none; font-family: Arial, sans-serif;
            }
            .right-side {
                flex: 1; background-color: #8b0000;
                border-radius: 8px; padding: 20px; color: white;
            }
            .right-side h2 {
                font-size: 20px; margin-bottom: 15px;
                border-bottom: 2px solid white; padding-bottom: 8px;
            }
            .headline {
                background-color: rgba(255,255,255,0.1); border-radius: 6px;
                padding: 12px; margin-bottom: 12px; font-size: 14px;
                line-height: 1.5; cursor: pointer;
            }
            .headline:hover { background-color: rgba(255,255,255,0.2); }
            .headline .date { font-size: 11px; color: #ffaaaa; margin-bottom: 4px; }

            /* TABLE STYLES */
            .page-content { padding: 20px; }
            .data-table {
                width: 100%; border-collapse: collapse;
                font-size: 15px; margin-top: 10px;
            }
            .data-table th {
                background-color: #29abe2; color: white;
                padding: 10px 14px; text-align: left;
                font-weight: bold; border: 1px solid #1a8abf;
            }
            .data-table td {
                padding: 9px 14px; border: 1px solid #ddd;
            }
            .data-table tr:nth-child(even) { background-color: #f2f2f2; }
            .data-table tr:hover { background-color: #e0f3fc; }

            .page-title {
                font-size: 26px; font-weight: bold;
                color: #1a1a1a; margin-bottom: 16px;
                border-left: 5px solid #e10600; padding-left: 12px;
            }
            .action-link {
                color: #29abe2; text-decoration: none;
                font-weight: bold; margin-right: 8px;
            }
            .action-link:hover { color: #e10600; text-decoration: underline; }
        </style>
    </h:head>
    <h:body>

        <!-- HEADER -->
        <div class="header">
            <input type="text" class="search-bar" placeholder="Search..." />
            <h1><a class="home-link" href="index.xhtml">Formula 1</a></h1>
            <div class="user-info">
                <span class="welcome-text">
                    <h:outputText value="#{loginBean.welcomeMessage}" />
                </span>
                <h:form>
                    <h:commandButton value="Logout" action="#{loginBean.logout}"
                        styleClass="logout-btn" />
                </h:form>
            </div>
        </div>

        <!-- NAV BUTTONS -->
        <div class="nav-buttons">
            <a href="#{request.contextPath}/Seasons.xhtml"  class="nav-button">Seasons</a>
            <a href="#{request.contextPath}/Teams.xhtml"    class="nav-button">Teams</a>
            <a href="#{request.contextPath}/Drivers.xhtml"  class="nav-button">Drivers</a>
            <a href="#{request.contextPath}/Circuits.xhtml" class="nav-button">Circuits</a>
        </div>

        <!-- PAGE CONTENT -->
        <div class="page-content">
            <ui:insert name="content"></ui:insert>
        </div>

    </h:body>
</html>
