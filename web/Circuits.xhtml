<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <ui:composition template="./template.xhtml">
        <ui:define name="content">
            <div class="page-title">Circuits</div>
            <h:form>
                <h:panelGroup id="messagePanel" layout="block">
                    <h:messages errorStyle="color: red" infoStyle="color: green" layout="table"/>
                </h:panelGroup>
                <h:outputText escape="false" value="No circuits found." rendered="#{circuitsController.items.rowCount == 0}"/>
                <h:panelGroup rendered="#{circuitsController.items.rowCount > 0}">
                    <h:dataTable value="#{circuitsController.items}" var="item"
                                 styleClass="data-table">
                        <h:column>
                            <f:facet name="header">ID</f:facet>
                            <h:outputText value="#{item.circuitId}"/>
                        </h:column>
                        <h:column>
                            <f:facet name="header">Name</f:facet>
                            <h:outputText value="#{item.name}"/>
                        </h:column>
                        <h:column>
                            <f:facet name="header">Location</f:facet>
                            <h:outputText value="#{item.location}"/>
                        </h:column>
                        <h:column>
                            <f:facet name="header">Length</f:facet>
                            <h:outputText value="#{item.length}"/>
                        </h:column>
                        <h:column>
                            <f:facet name="header">Turns</f:facet>
                            <h:outputText value="#{item.turns}"/>
                        </h:column>
                        <h:column>
                            <f:facet name="header">Type</f:facet>
                            <h:outputText value="#{item.type}"/>
                        </h:column>
                        <h:column>
                            <f:facet name="header">Actions</f:facet>
                            <h:commandLink action="#{circuitsController.prepareView}" styleClass="action-link" value="View"/>
                            <h:commandLink action="#{circuitsController.prepareEdit}" styleClass="action-link" value="Edit"/>
                            <h:commandLink action="#{circuitsController.destroy}"    styleClass="action-link" value="Delete"/>
                        </h:column>
                    </h:dataTable>
                    <br/>
                    <h:outputText value="#{circuitsController.pagination.pageFirstItem + 1}–#{circuitsController.pagination.pageLastItem + 1} of #{circuitsController.pagination.itemsCount}"/>
                    &#160;
                    <h:commandLink action="#{circuitsController.previous}" value="&lt; Prev" rendered="#{circuitsController.pagination.hasPreviousPage}" styleClass="action-link"/>
                    <h:commandLink action="#{circuitsController.next}"     value="Next &gt;" rendered="#{circuitsController.pagination.hasNextPage}"     styleClass="action-link"/>
                </h:panelGroup>
                <br/>
                <h:commandLink action="#{circuitsController.prepareCreate}" styleClass="action-link" value="+ Add New Circuit"/>
            </h:form>
        </ui:define>
    </ui:composition>
</html>
