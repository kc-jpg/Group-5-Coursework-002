<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <ui:composition template="/template.xhtml">
        <ui:define name="title">
            <h:outputText value="#{bundle.ListBookmarksTitle}"></h:outputText>
        </ui:define>
        <ui:define name="body">
            <h:form styleClass="jsfcrud_list_form">
                <h:panelGroup id="messagePanel" layout="block">
                    <h:messages errorStyle="color: red" infoStyle="color: green" layout="table"/>
                </h:panelGroup>
                <h:outputText escape="false" value="#{bundle.ListBookmarksEmpty}" rendered="#{bookmarksController.items.rowCount == 0}"/>
                <h:panelGroup rendered="#{bookmarksController.items.rowCount > 0}">
                    <h:outputText value="#{bookmarksController.pagination.pageFirstItem + 1}..#{bookmarksController.pagination.pageLastItem + 1}/#{bookmarksController.pagination.itemsCount}"/>&nbsp;
                    <h:commandLink action="#{bookmarksController.previous}" value="#{bundle.Previous} #{bookmarksController.pagination.pageSize}" rendered="#{bookmarksController.pagination.hasPreviousPage}"/>&nbsp;
                    <h:commandLink action="#{bookmarksController.next}" value="#{bundle.Next} #{bookmarksController.pagination.pageSize}" rendered="#{bookmarksController.pagination.hasNextPage}"/>&nbsp;
                    <h:dataTable value="#{bookmarksController.items}" var="item" border="0" cellpadding="2" cellspacing="0" rowClasses="jsfcrud_odd_row,jsfcrud_even_row" rules="all" style="border:solid 1px">
                        <h:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListBookmarksTitle_bookmarkId}"/>
                            </f:facet>
                            <h:outputText value="#{item.bookmarkId}"/>
                        </h:column>
                        <h:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListBookmarksTitle_itemId}"/>
                            </f:facet>
                            <h:outputText value="#{item.itemId}"/>
                        </h:column>
                        <h:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListBookmarksTitle_itemType}"/>
                            </f:facet>
                            <h:outputText value="#{item.itemType}"/>
                        </h:column>
                        <h:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListBookmarksTitle_addedAt}"/>
                            </f:facet>
                            <h:outputText value="#{item.addedAt}">
                                <f:convertDateTime pattern="MM/dd/yyyy HH:mm:ss" />
                            </h:outputText>
                        </h:column>
                        <h:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListBookmarksTitle_userId}"/>
                            </f:facet>
                            <h:outputText value="#{item.userId}"/>
                        </h:column>
                        <h:column>
                            <f:facet name="header">
                                <h:outputText value="&nbsp;"/>
                            </f:facet>
                            <h:commandLink action="#{bookmarksController.prepareView}" value="#{bundle.ListBookmarksViewLink}"/>
                            <h:outputText value=" "/>
                            <h:commandLink action="#{bookmarksController.prepareEdit}" value="#{bundle.ListBookmarksEditLink}"/>
                            <h:outputText value=" "/>
                            <h:commandLink action="#{bookmarksController.destroy}" value="#{bundle.ListBookmarksDestroyLink}"/>
                        </h:column>
                    </h:dataTable>
                </h:panelGroup>
                <br />
                <h:commandLink action="#{bookmarksController.prepareCreate}" value="#{bundle.ListBookmarksCreateLink}"/>
                <br />
                <br />
                <h:link outcome="/index" value="#{bundle.ListBookmarksIndexLink}"/>
            </h:form>
        </ui:define>
    </ui:composition>

</html>
