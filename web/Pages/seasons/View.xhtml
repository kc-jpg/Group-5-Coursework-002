<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <ui:composition template="/template.xhtml">
        <ui:define name="title">
            <h:outputText value="#{bundle.ViewSeasonsTitle}"></h:outputText>
        </ui:define>
        <ui:define name="body">
            <h:panelGroup id="messagePanel" layout="block">
                <h:messages errorStyle="color: red" infoStyle="color: green" layout="table"/>
            </h:panelGroup>
            <h:form>
                <h:panelGrid columns="2">
                    <h:outputText value="#{bundle.ViewSeasonsLabel_seasonYear}"/>
                    <h:outputText value="#{seasonsController.selected.seasonYear}" title="#{bundle.ViewSeasonsTitle_seasonYear}"/>
                    <h:outputText value="#{bundle.ViewSeasonsLabel_winnerDriverId}"/>
                    <h:outputText value="#{seasonsController.selected.winnerDriverId}" title="#{bundle.ViewSeasonsTitle_winnerDriverId}"/>
                    <h:outputText value="#{bundle.ViewSeasonsLabel_winnerConstructorId}"/>
                    <h:outputText value="#{seasonsController.selected.winnerConstructorId}" title="#{bundle.ViewSeasonsTitle_winnerConstructorId}"/>
                </h:panelGrid>
                <br />
                <h:commandLink action="#{seasonsController.destroyAndView}" value="#{bundle.ViewSeasonsDestroyLink}"/>
                <br />
                <br />
                <h:link outcome="Edit" value="#{bundle.ViewSeasonsEditLink}"/>
                <br />
                <h:commandLink action="#{seasonsController.prepareCreate}" value="#{bundle.ViewSeasonsCreateLink}" />
                <br />
                <h:commandLink action="#{seasonsController.prepareList}" value="#{bundle.ViewSeasonsShowAllLink}"/>
                <br />
                <br />
                <h:link outcome="/index" value="#{bundle.ViewSeasonsIndexLink}"/>

            </h:form>
        </ui:define>
    </ui:composition>

</html>
