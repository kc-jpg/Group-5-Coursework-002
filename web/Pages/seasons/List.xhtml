<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <ui:composition template="/template.xhtml">
        <ui:define name="title">
            <h:outputText value="#{bundle.ListSeasonsTitle}"></h:outputText>
        </ui:define>
        <ui:define name="body">
            <h:form styleClass="jsfcrud_list_form">
                <h:panelGroup id="messagePanel" layout="block">
                    <h:messages errorStyle="color: red" infoStyle="color: green" layout="table"/>
                </h:panelGroup>
                <h:outputText escape="false" value="#{bundle.ListSeasonsEmpty}" rendered="#{seasonsController.items.rowCount == 0}"/>
                <h:panelGroup rendered="#{seasonsController.items.rowCount > 0}">
                    <h:outputText value="#{seasonsController.pagination.pageFirstItem + 1}..#{seasonsController.pagination.pageLastItem + 1}/#{seasonsController.pagination.itemsCount}"/>&nbsp;
                    <h:commandLink action="#{seasonsController.previous}" value="#{bundle.Previous} #{seasonsController.pagination.pageSize}" rendered="#{seasonsController.pagination.hasPreviousPage}"/>&nbsp;
                    <h:commandLink action="#{seasonsController.next}" value="#{bundle.Next} #{seasonsController.pagination.pageSize}" rendered="#{seasonsController.pagination.hasNextPage}"/>&nbsp;
                    <h:dataTable value="#{seasonsController.items}" var="item" border="0" cellpadding="2" cellspacing="0" rowClasses="jsfcrud_odd_row,jsfcrud_even_row" rules="all" style="border:solid 1px">
                        <h:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListSeasonsTitle_seasonYear}"/>
                            </f:facet>
                            <h:outputText value="#{item.seasonYear}"/>
                        </h:column>
                        <h:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListSeasonsTitle_winnerDriverId}"/>
                            </f:facet>
                            <h:outputText value="#{item.winnerDriverId}"/>
                        </h:column>
                        <h:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListSeasonsTitle_winnerConstructorId}"/>
                            </f:facet>
                            <h:outputText value="#{item.winnerConstructorId}"/>
                        </h:column>
                        <h:column>
                            <f:facet name="header">
                                <h:outputText value="&nbsp;"/>
                            </f:facet>
                            <h:commandLink action="#{seasonsController.prepareView}" value="#{bundle.ListSeasonsViewLink}"/>
                            <h:outputText value=" "/>
                            <h:commandLink action="#{seasonsController.prepareEdit}" value="#{bundle.ListSeasonsEditLink}"/>
                            <h:outputText value=" "/>
                            <h:commandLink action="#{seasonsController.destroy}" value="#{bundle.ListSeasonsDestroyLink}"/>
                        </h:column>
                    </h:dataTable>
                </h:panelGroup>
                <br />
                <h:commandLink action="#{seasonsController.prepareCreate}" value="#{bundle.ListSeasonsCreateLink}"/>
                <br />
                <br />
                <h:link outcome="/index" value="#{bundle.ListSeasonsIndexLink}"/>
            </h:form>
        </ui:define>
    </ui:composition>

</html>
