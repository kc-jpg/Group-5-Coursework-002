<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <ui:composition template="/template.xhtml">
        <ui:define name="title">
            <h:outputText value="#{bundle.CreateTeamsTitle}"></h:outputText>
        </ui:define>
        <ui:define name="body">
            <h:panelGroup id="messagePanel" layout="block">
                <h:messages errorStyle="color: red" infoStyle="color: green" layout="table"/>
            </h:panelGroup>
            <h:form>
                <h:panelGrid columns="2">
                    <h:outputLabel value="#{bundle.CreateTeamsLabel_teamId}" for="teamId" />
                    <h:inputText id="teamId" value="#{teamsController.selected.teamId}" title="#{bundle.CreateTeamsTitle_teamId}" required="true" requiredMessage="#{bundle.CreateTeamsRequiredMessage_teamId}"/>
                    <h:outputLabel value="#{bundle.CreateTeamsLabel_teamName}" for="teamName" />
                    <h:inputText id="teamName" value="#{teamsController.selected.teamName}" title="#{bundle.CreateTeamsTitle_teamName}" required="true" requiredMessage="#{bundle.CreateTeamsRequiredMessage_teamName}"/>
                    <h:outputLabel value="#{bundle.CreateTeamsLabel_baseCountry}" for="baseCountry" />
                    <h:inputText id="baseCountry" value="#{teamsController.selected.baseCountry}" title="#{bundle.CreateTeamsTitle_baseCountry}" />
                    <h:outputLabel value="#{bundle.CreateTeamsLabel_principal}" for="principal" />
                    <h:inputText id="principal" value="#{teamsController.selected.principal}" title="#{bundle.CreateTeamsTitle_principal}" />
                    <h:outputLabel value="#{bundle.CreateTeamsLabel_engine}" for="engine" />
                    <h:inputText id="engine" value="#{teamsController.selected.engine}" title="#{bundle.CreateTeamsTitle_engine}" />
                </h:panelGrid>
                <br />
                <h:commandLink action="#{teamsController.create}" value="#{bundle.CreateTeamsSaveLink}" />
                <br />
                <br />
                <h:commandLink action="#{teamsController.prepareList}" value="#{bundle.CreateTeamsShowAllLink}" immediate="true"/>
                <br />
                <br />
                <h:link outcome="/index" value="#{bundle.CreateTeamsIndexLink}"/>
            </h:form>
        </ui:define>
    </ui:composition>

</html>
