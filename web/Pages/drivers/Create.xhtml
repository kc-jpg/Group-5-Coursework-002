<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <ui:composition template="/template.xhtml">
        <ui:define name="title">
            <h:outputText value="#{bundle.CreateDriversTitle}"></h:outputText>
        </ui:define>
        <ui:define name="body">
            <h:panelGroup id="messagePanel" layout="block">
                <h:messages errorStyle="color: red" infoStyle="color: green" layout="table"/>
            </h:panelGroup>
            <h:form>
                <h:panelGrid columns="2">
                    <h:outputLabel value="#{bundle.CreateDriversLabel_driverId}" for="driverId" />
                    <h:inputText id="driverId" value="#{driversController.selected.driverId}" title="#{bundle.CreateDriversTitle_driverId}" required="true" requiredMessage="#{bundle.CreateDriversRequiredMessage_driverId}"/>
                    <h:outputLabel value="#{bundle.CreateDriversLabel_name}" for="name" />
                    <h:inputText id="name" value="#{driversController.selected.name}" title="#{bundle.CreateDriversTitle_name}" required="true" requiredMessage="#{bundle.CreateDriversRequiredMessage_name}"/>
                    <h:outputLabel value="#{bundle.CreateDriversLabel_nationality}" for="nationality" />
                    <h:inputText id="nationality" value="#{driversController.selected.nationality}" title="#{bundle.CreateDriversTitle_nationality}" />
                    <h:outputLabel value="#{bundle.CreateDriversLabel_dob}" for="dob" />
                    <h:inputText id="dob" value="#{driversController.selected.dob}" title="#{bundle.CreateDriversTitle_dob}" >
                        <f:convertDateTime pattern="MM/dd/yyyy" />
                    </h:inputText>
                    <h:outputLabel value="#{bundle.CreateDriversLabel_teamId}" for="teamId" />
                    <h:selectOneMenu id="teamId" value="#{driversController.selected.teamId}" title="#{bundle.CreateDriversTitle_teamId}" >
                        <f:selectItems value="#{teamsController.itemsAvailableSelectOne}"/>
                    </h:selectOneMenu>
                </h:panelGrid>
                <br />
                <h:commandLink action="#{driversController.create}" value="#{bundle.CreateDriversSaveLink}" />
                <br />
                <br />
                <h:commandLink action="#{driversController.prepareList}" value="#{bundle.CreateDriversShowAllLink}" immediate="true"/>
                <br />
                <br />
                <h:link outcome="/index" value="#{bundle.CreateDriversIndexLink}"/>
            </h:form>
        </ui:define>
    </ui:composition>

</html>
