<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <ui:composition template="/template.xhtml">
        <ui:define name="title">
            <h:outputText value="#{bundle.ViewDriversTitle}"></h:outputText>
        </ui:define>
        <ui:define name="body">
            <h:panelGroup id="messagePanel" layout="block">
                <h:messages errorStyle="color: red" infoStyle="color: green" layout="table"/>
            </h:panelGroup>
            <h:form>
                <h:panelGrid columns="2">
                    <h:outputText value="#{bundle.ViewDriversLabel_driverId}"/>
                    <h:outputText value="#{driversController.selected.driverId}" title="#{bundle.ViewDriversTitle_driverId}"/>
                    <h:outputText value="#{bundle.ViewDriversLabel_name}"/>
                    <h:outputText value="#{driversController.selected.name}" title="#{bundle.ViewDriversTitle_name}"/>
                    <h:outputText value="#{bundle.ViewDriversLabel_nationality}"/>
                    <h:outputText value="#{driversController.selected.nationality}" title="#{bundle.ViewDriversTitle_nationality}"/>
                    <h:outputText value="#{bundle.ViewDriversLabel_dob}"/>
                    <h:outputText value="#{driversController.selected.dob}" title="#{bundle.ViewDriversTitle_dob}">
                        <f:convertDateTime pattern="MM/dd/yyyy" />
                    </h:outputText>
                    <h:outputText value="#{bundle.ViewDriversLabel_teamId}"/>
                    <h:outputText value="#{driversController.selected.teamId}" title="#{bundle.ViewDriversTitle_teamId}"/>
                </h:panelGrid>
                <br />
                <h:commandLink action="#{driversController.destroyAndView}" value="#{bundle.ViewDriversDestroyLink}"/>
                <br />
                <br />
                <h:link outcome="Edit" value="#{bundle.ViewDriversEditLink}"/>
                <br />
                <h:commandLink action="#{driversController.prepareCreate}" value="#{bundle.ViewDriversCreateLink}" />
                <br />
                <h:commandLink action="#{driversController.prepareList}" value="#{bundle.ViewDriversShowAllLink}"/>
                <br />
                <br />
                <h:link outcome="/index" value="#{bundle.ViewDriversIndexLink}"/>

            </h:form>
        </ui:define>
    </ui:composition>

</html>
