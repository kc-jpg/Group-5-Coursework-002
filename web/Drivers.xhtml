<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <ui:composition template="./template.xhtml">
        <ui:define name="content">
            <div class="page-title">Drivers</div>
            <h:form>
                <h:panelGroup id="messagePanel" layout="block">
                    <h:messages errorStyle="color: red" infoStyle="color: green" layout="table"/>
                </h:panelGroup>
                <h:outputText escape="false" value="No drivers found." rendered="#{driversController.items.rowCount == 0}"/>
                <h:panelGroup rendered="#{driversController.items.rowCount > 0}">
                    <h:dataTable value="#{driversController.items}" var="item"
                                 styleClass="data-table">
                        <h:column>
                            <f:facet name="header">ID</f:facet>
                            <h:outputText value="#{item.driverId}"/>
                        </h:column>
                        <h:column>
                            <f:facet name="header">Name</f:facet>
                            <h:outputText value="#{item.name}"/>
                        </h:column>
                        <h:column>
                            <f:facet name="header">Nationality</f:facet>
                            <h:outputText value="#{item.nationality}"/>
                        </h:column>
                        <h:column>
                            <f:facet name="header">Date of Birth</f:facet>
                            <h:outputText value="#{item.dob}">
                                <f:convertDateTime pattern="dd/MM/yyyy"/>
                            </h:outputText>
                        </h:column>
                        <h:column>
                            <f:facet name="header">Team</f:facet>
                            <h:outputText value="#{item.teamId}"/>
                        </h:column>
                        <h:column>
                            <f:facet name="header">Actions</f:facet>
                            <h:commandLink action="#{driversController.prepareView}" styleClass="action-link" value="View"/>
                            <h:commandLink action="#{driversController.prepareEdit}" styleClass="action-link" value="Edit"/>
                            <h:commandLink action="#{driversController.destroy}"    styleClass="action-link" value="Delete"/>
                        </h:column>
                    </h:dataTable>
                    <br/>
                    <h:outputText value="#{driversController.pagination.pageFirstItem + 1}–#{driversController.pagination.pageLastItem + 1} of #{driversController.pagination.itemsCount}"/>
                    &#160;
                    <h:commandLink action="#{driversController.previous}" value="&lt; Prev" rendered="#{driversController.pagination.hasPreviousPage}" styleClass="action-link"/>
                    <h:commandLink action="#{driversController.next}"     value="Next &gt;" rendered="#{driversController.pagination.hasNextPage}"     styleClass="action-link"/>
                </h:panelGroup>
                <br/>
                <h:commandLink action="#{driversController.prepareCreate}" styleClass="action-link" value="+ Add New Driver"/>
            </h:form>
        </ui:define>
    </ui:composition>
</html>
